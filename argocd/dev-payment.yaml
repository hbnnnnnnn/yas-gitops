
apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: dev-payment

  namespace: argocd

spec:

  project: default

  sources:

    - repoURL: https://github.com/your-username/yas

      targetRevision: main

      path: k8s/charts/payment

      helm:

        valueFiles:

          - $values/dev/payment.values.yaml

    - repoURL: https://github.com/your-org/yas-gitops

      targetRevision: HEAD

      ref: values

  destination:

    server: https://kubernetes.default.svc

    namespace: dev

  syncPolicy:

    automated:

      prune: true

      selfHeal: true


apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-backoffice-bff
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/nashtech-garage/yas
      targetRevision: main
      path: k8s/charts/backoffice-bff
      helm:
        valueFiles:
          - $values/dev/backoffice-bff.values.yaml
    - repoURL: https://github.com/your-org/yas-gitops
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

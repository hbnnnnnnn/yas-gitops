
apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: staging-backoffice-ui

  namespace: argocd

spec:

  project: default

  sources:

    - repoURL: https://github.com/your-username/yas

      targetRevision: main

      path: k8s/charts/backoffice-ui

      helm:

        valueFiles:

          - $values/staging/backoffice-ui.values.yaml

    - repoURL: https://github.com/your-org/yas-gitops

      targetRevision: HEAD

      ref: values

  destination:

    server: https://kubernetes.default.svc

    namespace: staging

  syncPolicy:

    automated:

      prune: true

      selfHeal: true



apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: dev-backoffice-ui

  namespace: argocd

spec:

  project: default

  sources:

    - repoURL: https://github.com/hbnnnnnnn/yas-project-2

      targetRevision: main

      path: k8s/charts/backoffice-ui

      helm:

        valueFiles:

          - $values/dev/backoffice-ui.values.yaml

    - repoURL: https://github.com/hbnnnnnnn/yas-gitops

      targetRevision: HEAD

      ref: values

  destination:

    server: https://kubernetes.default.svc

    namespace: dev

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

